          {

              "экожүйе",

              "ұлпа",
              "жасуша",
              "мүше",

            answer: 0,
            explanation: "Экожүйе тірі ағзалар мен абиотикалық ортаның өзара байланысқан жүйесін білдіреді."
          }

    ];

    const testArea = document.getElementById("testArea");
    const cards = document.querySelectorAll(".variant-card");

    function renderTests() {
      testArea.innerHTML = tests.map((test, testIndex) => {
        return `
          <div class="test-panel ${testIndex === 0 ? "active" : ""}" id="test-${testIndex}">
            <div class="test-header">
              <div>
                <h2>${test.title}</h2>
                <p>${test.code}</p>
              </div>
              <div class="badge">${test.questions.length} сұрақ</div>
            </div>

            <div class="questions">
              ${test.questions.map((q, qIndex) => {
                return `
                  <div class="question" data-test="${testIndex}" data-question="${qIndex}">
                    <div class="question-title">${qIndex + 1}. ${q.text}</div>
                    <div class="options">
                      ${q.options.map((opt, optIndex) => {
                        return `
                          <label class="option" data-option="${optIndex}">
                            <input type="radio" name="t${testIndex}q${qIndex}" value="${optIndex}">
                            <span>${String.fromCharCode(65 + optIndex)}) ${opt}</span>
                          </label>
                        `;
                      }).join("")}
                    </div>
                    <div class="answer-box">
                      <p><strong>Дұрыс жауап:</strong> ${String.fromCharCode(65 + q.answer)}) ${q.options[q.answer]}</p>
                      <p><strong>Түсіндірме:</strong> ${q.explanation}</p>
                    </div>
                  </div>
                `;
              }).join("")}
            </div>

            <div class="actions">
              <button class="btn btn-primary" onclick="showResult(${testIndex})">Нәтижені көрсету</button>
              <button class="btn btn-secondary" onclick="resetTest(${testIndex})">Қайта тапсыру</button>
            </div>

            <div class="result-box" id="result-${testIndex}"></div>
          </div>
        `;
      }).join("");
    }

    function openTest(index) {
      document.querySelectorAll(".test-panel").forEach(panel => {
        panel.classList.remove("active");
      });

      document.getElementById(`test-${index}`).classList.add("active");

      cards.forEach(card => card.classList.remove("active"));
      cards[index].classList.add("active");

      document.getElementById(`test-${index}`).scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function showResult(testIndex) {
      const test = tests[testIndex];
      let score = 0;

      test.questions.forEach((q, qIndex) => {
        const questionEl = document.querySelector(
          `.question[data-test="${testIndex}"][data-question="${qIndex}"]`
        );

        const selected = questionEl.querySelector("input[type='radio']:checked");
        const optionEls = questionEl.querySelectorAll(".option");

        optionEls.forEach(opt => {
          opt.classList.remove("correct", "wrong");
        });

        optionEls[q.answer].classList.add("correct");

        if (selected) {
          const selectedValue = Number(selected.value);

          if (selectedValue === q.answer) {
            score++;
          } else {
            optionEls[selectedValue].classList.add("wrong");
          }
        }

        questionEl.querySelector(".answer-box").classList.add("show");
      });

      const resultBox = document.getElementById(`result-${testIndex}`);
      resultBox.classList.add("show");
      resultBox.textContent = `Сіздің нәтижеңіз: ${score}/${test.questions.length}`;

      resultBox.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }

    function resetTest(testIndex) {
      const panel = document.getElementById(`test-${testIndex}`);

      panel.querySelectorAll("input[type='radio']").forEach(input => {
        input.checked = false;
      });

      panel.querySelectorAll(".option").forEach(option => {
        option.classList.remove("correct", "wrong");
      });

      panel.querySelectorAll(".answer-box").forEach(box => {
        box.classList.remove("show");
      });

      const resultBox = document.getElementById(`result-${testIndex}`);
      resultBox.classList.remove("show");
      resultBox.textContent = "";

      panel.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    renderTests();
  </script>
</body>
</html>
